    [Yektanet](https://en.yektanet.com/) is the most renowned online marketing service provider in Iran.
    I have Worked in Core/Infrastructure team as a senior software engineer/Back-end developer for almost 9 months. Developing Base functionalities of all services of the enterprise using Django framework and NodeJS. It is safe to say that our team was the most crucial part of the firm. One minute of downtime on our side would have caused a lot of troubles and ugliness for both customers (websites) and users on the Persian network.
