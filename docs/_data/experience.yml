- company: Swiss Federal Institute of Technology Lausanne
  job_title: Research Assistant
  dates: Jul 2021 - Present
  description: | # this will include new lines to allow paragraphs
    In July 2021, I joined the Visual Intelligence for Transportation Lab ([VITA](https://www.epfl.ch/labs/vita/)), at the Swiss Federal Institute of Technology Lausanne (EPFL), 
    as a research assistant under the supervision of [Prof. Alexandre Alahi](https://people.epfl.ch/alexandre.alahi?lang=en). 
    At first, I conducted a literature review on **Human Pose Prediction** in which I studied the recently emerging networks **Transformers**.
    As a start, we participated in the Social Motion Forecasting challenge ([SoMoF](https://somof.stanford.edu/)), held by **Stanford University**, and won 3rd place.
    Our proposed method outperformed the baselines of the challenge by over 20% and got accepted in the ICCV workshops 2021. 
    After that, we started to build a comprehensive library for Pose Prediction. I studied numerous different methods of pose prediction and gained a deep understanding of the topic. I also got proficient in Pytorch.
    The current library supports eight famous datasets, and ten models, all of which I have implemented.


- company: Sharif University of Technology
  job_title: Research Assistant
  dates: Dec 2020 - Present
  description: | # this will include new lines to allow paragraphs
    In Dec. 2020, I joined the **Medical Image Analysis** group in Robust and Interpretable Machine Learning Lab ([RIML](http://sharif.ir/~rohban/)) as a research assistant under the supervision of 
    [Prof. Rohban](https://scholar.google.com/citations?hl=en&user=pRyJ6FkAAAAJ&view_op=list_works&sortby=pubdate). He is one of the brightest profs in our department, and I consider myself very lucky to be able to work with him and learn from him.
    We have been working on the NIH Chest x-ray dataset, a colossal dataset consisting of frontal-view chest images from more than 30,000 patients. We tested many different ideas to surpass state-of-the-art models.
    Recently, we leveraged a transformer-based model, essentially based on Swin-transformer or shifted windows, a work by Microsoft research.
    We leverage Swin and add muti-head MLP layers on top of that to perform better on multi-label classification, which is a must in our problem.
    

