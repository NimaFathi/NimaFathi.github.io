- company: Yektanet
  job_title: Data Scientist
  dates: May 2020 - Jul 2020
  description: |
    For three months, I have worked in the Data team at Yektanet and developed many projects, such as estimating users' location for better advertisement recommendations.
    My main project there was about predicting the approximate location of our users. We leverage a Bayesian approach, composing different types of data we had. For example, we scored users based on their approximate location coming from Push notifications and other data like buying a ticket for destiny or from which restaurant they order food.


