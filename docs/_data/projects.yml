- name: PV-LSTM
  image: images/posepred.jpg
  description: |
    ## **3D Human Pose Prediction: Where Do Simple Approaches Stand?**    

    ---
    3D human pose prediction, i.e., predicting future human poses given past observed ones, is a challenging spatio-temporal task that has recently received great attention. Over the past few years, approaches have become increasingly more complex, using Long Short-Term Memories (LSTMs), Graph Convolutional Networks (GCNs), or even Transformers to solve the problem. Yet, the question of the faithful evaluation of these methods remains not fully addressed.
    In this paper, we provide a more objective view on the state of the art and on where research currently stands on this problem.
    In particular, we show that recent models published in top-tier venues still fail to beat a very basic baseline not involving any learning. Then, we argue that some classes of human actions are not easily predictable (even by humans), hence should not be used in the overall learning process. 
    Based on these observations, we propose a simple yet effective LSTM-based encoder-decoder architecture that learns an effective representation for simultaneous prediction of future poses and reconstruction of past ones. We show that discarding classes of actions based on the relative performance of a learning method against a non learning one positively impacts the learning process.
    We investigate our findings on several standard datasets (Human3.6M, JTA and 3DPW), and obtain a significant improvement over the state of the art.
    The code will be made available online upon publication.
    
    <span style="color:#900"> **Nima Fathi**, Armin Saadat, Saeed Saadatnejad, Teylor Mordan, Alexandre Alahi - (Submitted CVPR'22) </span>  

- name: Posepred_Method
  image: images/somof_method.png
  description: |
    ## **Towards Human Pose Prediction using the Encoder-Decoder LSTM**
    
    ---
    
    **Human Pose Prediction** is defined as predicting the human keypoints locations for future frames, given the observed ones for past frames. 
    It has numerous applications in various fields like **Autonomous Driving**. 
    This task can be seen as a fine-grained task while human bounding box and trajectory prediction deal with more coarse-grained information. 
    The former has been investigated less. Here, we propose a **Recurrent Autoencoder Model** to do the more challenging task of pose prediction in the "Social Motion Forecasting" challenge conducted by **Stanford University**. 
    The results show the effectiveness of our method as it outperforms the available baselines by over 20% in evaluation metrics. 
    [**Source-Code**](https://github.com/Armin-Saadat/pose-prediction-autoencoder) [**Report**](https://somof.stanford.edu/cgi-bin/public/ICCVSoMoF2021AllFiles/15/Supplementary/paper.pdf) [**ICCV Poster**](https://somof.stanford.edu/cgi-bin/public/ICCVSoMoF2021AllFiles/15/Supplementary/poster.pdf)


    <span style="color:#900"> **Nima Fathi**, Armin Saadat, Saeed Saadatnejad, Alexandre Alahi - (Accepted, ICCV'21) </span> 
    
    
- name: SwinCheX
  image: images/cxr2.jpg
  description: |
    ## **SwinCheX: Multi-label classification on chest X-ray images with transformer**
    
    ---
    According to the considerable growth in the avail of chest X-ray images as well as gathering extensive datasets, having an automated procedure using deep neural networks has occupied the minds of experts.
    Most of the available methods in computer vision use a CNN backbone to acquire high accuracy on classification problems.
    Nevertheless, recent researches show that transformers, established as the de facto method in NLP, can also outperform many CNN-based models in vision. This paper proposes a multi-label classification model based on Swin Transformer for the front section.
    It leverages manifold layers of Multi-Layer Perceptrons, also known as MLP, for the head architecture.
    We evaluate our model on one of the most extensive x-ray datasets called “Chest X-ray14”, which comprises more than 100,000 frontal-view images from over 30,000 patients with 14 famous chest diseases.
    Our model has been tested with several MLP layers for head settings; Each achieves a considerable AUC score on all classes. However, Comprehensive experiments on Chest X-ray14 have shown that a 3-layer head attains state-of-the-art performance with an average AUC score of 0.810. 
    [**Source-Code**](https://github.com/taslimisina/Swin-Transformer)

    <span style="color:#900"> Sina Taslimi, Soroush Taslimi, **Nima Fathi**, Mohammadreza Salehi, Mohammad H. Rohban-(Manuscript In preparation)</span>          


- name: PosePred
  image: images/noimage.jpg
  description: |
    ## **Human Body Pose Prediction Framework**
    
    ---
    
    Pospred is an open-source toolbox for pose prediction based on PyTorch. It is a part of the VitaLab project.
    It has many handy features, which researchers of the field can readily put into use, like various datasets, a colossal model zoo, 2D visualizer, 3D visualizer, 3D to 2D overlay, and many more.
    [**Source-Code**](https://github.com/vita-epfl/posepred)

    <span style="color:#900"> **Nima Fathi**, Armin Saadat, Saeed Saadatnejad, Alexandre Alahi</span>
    
